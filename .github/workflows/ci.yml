name: CI

on:
  push:
    branches: [master, develop]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PUB_ENVIRONMENT: bot.github

jobs:
  analysis:
    name: Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported Flutter version for the plugin. The example app
          # requires a newer Flutter than the plugin does, so it is skipped here.
          - flutter-version: "3.29.x"
            pub-get-args: "--no-example"
            analyze-paths: "lib test"
          # Latest stable, which analyzes the plugin and the example app.
          - flutter-version: ""
            pub-get-args: ""
            analyze-paths: "."

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable
          cache: true

      - name: Flutter Version Info
        run: flutter doctor -v

      - name: Cache Pub Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get ${{ matrix.pub-get-args }}

      - name: Lint Code
        run: flutter analyze ${{ matrix.analyze-paths }}

  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get

      - name: Check Code Formatting
        run: dart format --set-exit-if-changed .

  unit_tests:
    name: Unit Tests
    needs: [analysis, formatting]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        flutter-version: ["3.29.x", ""]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: stable
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        run: flutter pub get --no-example

      - name: Run Unit Tests with Coverage
        run: flutter test --coverage

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-${{ matrix.flutter-version || 'latest' }}
          path: coverage/lcov.info

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          flags: unittests
          name: codecov-flutter-${{ matrix.flutter-version || 'latest' }}
          fail_ci_if_error: true

  build_android:
    name: Build Android
    needs: [analysis, formatting]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        working-directory: example
        run: flutter pub get

      # Also generates example/android/local.properties, which the Gradle
      # build below needs to locate the Flutter SDK.
      - name: Build Example App
        working-directory: example
        run: flutter build apk --debug

      - name: Run Plugin Unit Tests
        working-directory: example/android
        run: ./gradlew :mobile_scanner:testDebugUnitTest

      - name: Upload Unit Test Report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-unit-test-report
          path: example/build/mobile_scanner/reports/tests/

  build_ios:
    name: Build iOS
    needs: [analysis, formatting]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Example App
        working-directory: example
        run: flutter build ios --debug --no-codesign

  build_macos:
    name: Build macOS
    needs: [analysis, formatting]
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Example App
        working-directory: example
        run: flutter build macos --debug

  build_web:
    name: Build Web
    needs: [analysis, formatting]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Pub Dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Example App
        working-directory: example
        run: flutter build web