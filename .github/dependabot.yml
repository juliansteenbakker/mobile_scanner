 version: 2
 updates:
   - package-ecosystem: "github-actions"
     directory: "/"
     schedule:
       interval: "weekly"
     reviewers:
       - "juliansteenbakker"
     commit-message:
       prefix: "chore"
       include: "scope"
   - package-ecosystem: gradle
     directory: "/android"
     schedule:
       interval: "monthly"
     reviewers:
       - "juliansteenbakker"
     commit-message:
       prefix: "chore"
       include: "scope"
   - package-ecosystem: gradle
     directory: "/example/android"
     schedule:
       interval: "monthly"
     reviewers:
       - "juliansteenbakker"
     commit-message:
       prefix: "chore"
       include: "scope"
   - package-ecosystem: "pub"
     directory: "/"
     schedule:
       interval: "weekly"
     commit-message:
       prefix: "chore"
       include: "scope"
     reviewers:
       - "juliansteenbakker"
   # Tracks the CDN-loaded web barcode libraries via the package.json at the
   # repository root. The pinned versions in
   # lib/src/web/web_library_versions.dart must be updated to match; the test
   # in test/web/web_library_versions_test.dart enforces this.
   - package-ecosystem: "npm"
     directory: "/"
     schedule:
       interval: "weekly"
     commit-message:
       prefix: "chore"
       include: "scope"
     reviewers:
       - "juliansteenbakker"
